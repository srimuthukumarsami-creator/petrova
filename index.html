<!DOCTYPE html>
<html>
<head>
<title>PETROVA AI</title>
<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}
h1{
    font-size:40px;
    color:#38bdf8;
}
button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:20px;
    background:#38bdf8;
    cursor:pointer;
}
.card{
    background:#1e293b;
    padding:20px;
    margin:20px auto;
    width:300px;
    border-radius:15px;
}
</style>
</head>

<body>

<h1>🚀 PETROVA</h1>
<p>Experience your future before you choose</p>

<button onclick="start()">Start Simulation</button>

<div id="quiz" style="display:none;" class="card">
    <h3 id="question"></h3>
    <button onclick="answer(0)">Option 1</button>
    <button onclick="answer(1)">Option 2</button>
</div>

<div id="result" class="card"></div>

<script>

let q = 0;
let score = 0;

const questions = [
{
    question:"You enjoy solving problems using logic?",
    options:["Yes","No"],
    answer:0
},
{
    question:"Do you like designing visuals?",
    options:["Yes","No"],
    answer:1
},
{
    question:"Do you enjoy working with data?",
    options:["Yes","No"],
    answer:0
}
];

function start(){
    document.getElementById("quiz").style.display="block";
    loadQuestion();
}

function loadQuestion(){
    document.getElementById("question").innerText=questions[q].question;

    let buttons=document.querySelectorAll("#quiz button");
    buttons[0].innerText=questions[q].options[0];
    buttons[1].innerText=questions[q].options[1];
}

function answer(ans){
    if(ans===questions[q].answer){
        score++;
    }

    q++;

    if(q<questions.length){
        loadQuestion();
    }else{
        showResult();
    }
}

function showResult(){
    let result=document.getElementById("result");

    if(score>=2){
        result.innerHTML="💻 You are suited for TECH roles like Software Engineer!";
    }else{
        result.innerHTML="🎨 You are suited for CREATIVE roles like Designer!";
    }
}

</script>

</body>
</html>
